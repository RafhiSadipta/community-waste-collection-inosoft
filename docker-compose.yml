services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: waste-collection-app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    depends_on:
      - mongo
    networks:
      - waste-collection

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: waste-collection-scheduler
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do php artisan schedule:run; sleep 60; done"]
    volumes:
      - .:/var/www
    depends_on:
      - mongo
    networks:
      - waste-collection

  mongo:
    image: mongo:7
    container_name: waste-collection-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - waste-collection

volumes:
  mongo_data:

networks:
  waste-collection:
    driver: bridge
